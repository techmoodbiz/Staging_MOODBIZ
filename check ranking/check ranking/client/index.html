<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rank Tracker · Moodbiz</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ── Moodbiz Brand System ──────────────────────────────────── */
    :root {
      --mb-dark:    #0D1117;
      --mb-navy:    #161B27;
      --mb-violet:  #7C3AED;
      --mb-violet2: #6D28D9;
      --mb-indigo:  #4F46E5;
      --mb-surface: #FFFFFF;
      --mb-bg:      #F4F6FB;
      --mb-border:  #E5E7EB;
      --mb-text:    #111827;
      --mb-muted:   #6B7280;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--mb-bg);
      color: var(--mb-text);
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }

    /* ── Sidebar site cards ──── */
    .site-card { transition: background .12s, border-color .12s; border-left: 3px solid transparent; }
    .site-card:hover { background: #F5F3FF; border-left-color: #C4B5FD; }
    .site-card.active { background: #EDE9FE; border-left-color: #7C3AED; }

    /* ── Spin ──── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .7s linear infinite; }

    /* ── Pos badge (non-tailwind radius) ──── */
    .badge { display:inline-flex; align-items:center; justify-content:center;
             min-width:44px; padding:2px 10px; border-radius:99px;
             font-size:11px; font-weight:700; letter-spacing:.3px; }

    /* ── Table row hover ──── */
    .rank-row:hover td { background: #FAFAFA; }
    .rank-row.checking td { background: #EFF6FF !important; }

    /* ── Input focus ──── */
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #7C3AED;
      box-shadow: 0 0 0 3px rgba(124,58,237,.12);
    }

    /* ── Fade in ──── */
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
    .fade-in { animation: fadeIn .2s ease; }
  </style>
</head>
<body class="min-h-screen flex flex-col">

<!-- ════════════ LOGIN OVERLAY ════════════ -->
<div id="loginOverlay" class="fixed inset-0 z-50 flex items-center justify-center"
     style="display:none!important; background:rgba(13,17,23,.85); backdrop-filter:blur(4px)">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 overflow-hidden fade-in">
    <!-- Header card -->
    <div class="bg-gradient-to-br from-[#161B27] to-[#1E2A4A] px-8 pt-8 pb-6 text-center">
      <div class="inline-flex items-center gap-2 mb-3">
        <svg width="28" height="28" viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#7C3AED"/>
          <path d="M8 22 L16 10 L24 22" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="16" cy="10" r="2" fill="white"/>
        </svg>
        <span class="text-white font-bold text-lg tracking-wide">Moodbiz</span>
      </div>
      <h2 class="text-white font-semibold text-base opacity-90">Rank Tracker</h2>
      <p class="text-blue-300 text-xs mt-1 opacity-70">Công cụ nội bộ — SEO Intelligence</p>
    </div>
    <!-- Form -->
    <div class="px-8 py-6">
      <form onsubmit="handleLogin(event)" class="space-y-4">
        <div>
          <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</label>
          <input id="loginEmail" type="email" required autocomplete="email"
            placeholder="you@moodbiz.vn"
            class="mt-1.5 w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm transition">
        </div>
        <div>
          <label class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Mật khẩu</label>
          <input id="loginPassword" type="password" required autocomplete="current-password"
            placeholder="••••••••"
            class="mt-1.5 w-full px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm transition">
        </div>
        <p id="loginError" class="text-sm text-red-500 hidden bg-red-50 rounded-lg px-3 py-2"></p>
        <button type="submit" id="loginBtn"
          class="w-full py-2.5 rounded-xl font-semibold text-sm text-white transition"
          style="background:linear-gradient(135deg,#7C3AED,#4F46E5)">
          Đăng nhập
        </button>
      </form>
    </div>
  </div>
</div>

<!-- ════════════ TOPBAR ════════════ -->
<header style="background:var(--mb-dark); border-bottom:1px solid #1E2535" class="flex-shrink-0 sticky top-0 z-30">
  <div class="max-w-screen-xl mx-auto px-5 h-14 flex items-center gap-3">
    <!-- Logo -->
    <div class="flex items-center gap-2.5">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none" class="flex-shrink-0">
        <rect width="32" height="32" rx="7" fill="#7C3AED"/>
        <path d="M8 22 L16 10 L24 22" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="16" cy="10" r="2" fill="white"/>
      </svg>
      <div class="leading-none">
        <span class="text-white font-bold text-sm">Moodbiz</span>
        <span class="text-purple-400 text-xs ml-1.5 font-medium">Rank Tracker</span>
      </div>
    </div>

    <div class="flex-1"></div>

    <!-- Actions -->
    <a href="/test/simulator.html" target="_blank"
      class="hidden sm:inline-flex items-center gap-1.5 text-xs px-3 py-1.5 rounded-lg transition"
      style="color:#9CA3AF; border:1px solid #2D3748"
      onmouseover="this.style.background='#1E2535'" onmouseout="this.style.background=''">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 100 14A7 7 0 008 1zM6.5 5.5a1.5 1.5 0 113 0 1.5 1.5 0 01-3 0zM8 10.5c-1.8 0-3.3-.9-4-2.3h8c-.7 1.4-2.2 2.3-4 2.3z"/></svg>
      Debug Simulator
    </a>

    <div id="userBadge" class="hidden items-center gap-2.5">
      <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg" style="background:#1A2235">
        <div class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold"
             style="background:#7C3AED; color:white" id="userAvatar">M</div>
        <span class="text-sm text-gray-300" id="userNameDisplay"></span>
      </div>
      <button onclick="logout()"
        class="text-xs px-3 py-1.5 rounded-lg transition font-medium"
        style="color:#EF4444; border:1px solid #3D1515"
        onmouseover="this.style.background='#2D1515'" onmouseout="this.style.background=''">
        Đăng xuất
      </button>
    </div>
  </div>
</header>

<!-- ════════════ MAIN LAYOUT ════════════ -->
<div class="flex-1 flex max-w-screen-xl mx-auto w-full px-4 py-5 gap-5">

  <!-- ── SIDEBAR ── -->
  <aside class="w-64 flex-shrink-0 flex flex-col gap-4">

    <!-- Add site -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Thêm Website</p>
      <form onsubmit="addSite(event)" class="space-y-2">
        <input id="domainInput" type="text" placeholder="example.com"
          class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm transition">
        <input id="nameInput" type="text" placeholder="Tên hiển thị (tuỳ chọn)"
          class="w-full px-3 py-2 border border-gray-200 rounded-xl text-sm transition">
        <button type="submit"
          class="w-full py-2 rounded-xl text-sm font-semibold text-white transition"
          style="background:var(--mb-violet)"
          onmouseover="this.style.background='var(--mb-violet2)'" onmouseout="this.style.background='var(--mb-violet)'">
          + Thêm website
        </button>
      </form>
    </div>

    <!-- Sites list -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex-1">
      <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Websites</p>
      <div id="sitesList" class="space-y-1">
        <p class="text-gray-400 text-xs text-center py-4">Đang tải...</p>
      </div>
    </div>

  </aside>

  <!-- ── MAIN CONTENT ── -->
  <main class="flex-1 min-w-0 flex flex-col gap-4">

    <!-- Keywords panel -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5" id="keywordsPanel">
      <div class="flex flex-col items-center justify-center py-10 text-center">
        <div class="w-12 h-12 rounded-2xl flex items-center justify-center mb-3" style="background:#EDE9FE">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2">
            <path d="M21 10H3M16 6l-4-4-4 4M8 18l4 4 4-4"/>
          </svg>
        </div>
        <p class="font-semibold text-gray-700 text-sm">Chọn một website để bắt đầu</p>
        <p class="text-gray-400 text-xs mt-1">Chọn từ danh sách bên trái hoặc thêm website mới</p>
      </div>
    </div>

    <!-- Rankings panel -->
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5" id="rankingsPanel" style="display:none">
    </div>

  </main>
</div><!-- end layout -->


<script>
const API = '/api';
let selectedSite = null;
let extJobId     = null;
let extPollTimer = null;
let currentUser  = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
function getToken()  { try { return localStorage.getItem('moodbiz_token'); } catch(e) { return null; } }
function setToken(t) { try { localStorage.setItem('moodbiz_token', t); } catch(e) {} }
function clearToken(){ try { localStorage.removeItem('moodbiz_token'); } catch(e) {} }

function showLoginOverlay(show) {
  document.getElementById('loginOverlay').style.cssText = show ? '' : 'display:none!important';
}

function showUserBadge(user) {
  const badge  = document.getElementById('userBadge');
  const nameEl = document.getElementById('userNameDisplay');
  const avatar = document.getElementById('userAvatar');
  if (user) {
    nameEl.textContent  = user.name || user.email;
    avatar.textContent  = (user.name || user.email || 'M')[0].toUpperCase();
    badge.classList.remove('hidden');
    badge.classList.add('flex');
  } else {
    badge.classList.add('hidden');
    badge.classList.remove('flex');
  }
}

async function checkAuth() {
  const token = getToken();
  if (!token) { showLoginOverlay(true); return false; }
  try {
    const res = await fetch(API + '/auth/me', { headers: { 'Authorization': 'Bearer ' + token } });
    if (!res.ok) throw new Error('invalid');
    currentUser = await res.json();
    showLoginOverlay(false);
    showUserBadge(currentUser);
    return true;
  } catch(e) { clearToken(); showLoginOverlay(true); return false; }
}

async function handleLogin(e) {
  e.preventDefault();
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  const btn      = document.getElementById('loginBtn');
  errEl.classList.add('hidden');
  btn.disabled = true; btn.textContent = 'Đang xác thực...';
  try {
    const res  = await fetch(API + '/auth/login', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Đăng nhập thất bại');
    setToken(data.token);
    currentUser = data.user;
    showLoginOverlay(false);
    showUserBadge(currentUser);
    await loadSites();
  } catch(err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  } finally {
    btn.disabled = false; btn.textContent = 'Đăng nhập';
  }
}

function logout() {
  clearToken(); currentUser = null; selectedSite = null;
  showUserBadge(null);
  document.getElementById('sitesList').innerHTML = '<p class="text-gray-400 text-xs text-center py-4">Đang tải...</p>';
  document.getElementById('keywordsPanel').innerHTML = emptyKeywordsHtml();
  document.getElementById('rankingsPanel').style.display = 'none';
  showLoginOverlay(true);
}

// ── API helper ────────────────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const headers = { 'Content-Type': 'application/json' };
  const token   = getToken();
  if (token) headers['Authorization'] = 'Bearer ' + token;
  const opts = { method, headers };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (res.status === 401) { clearToken(); showLoginOverlay(true); throw new Error('Phiên đăng nhập hết hạn'); }
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error || res.statusText);
  }
  return res.json();
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const authed = await checkAuth();
  if (authed) await loadSites();
}

// ── Sites ─────────────────────────────────────────────────────────────────────
function emptyKeywordsHtml() {
  return `<div class="flex flex-col items-center justify-center py-10 text-center">
    <div class="w-12 h-12 rounded-2xl flex items-center justify-center mb-3" style="background:#EDE9FE">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7C3AED" stroke-width="2">
        <path d="M21 10H3M16 6l-4-4-4 4M8 18l4 4 4-4"/>
      </svg>
    </div>
    <p class="font-semibold text-gray-700 text-sm">Chọn một website để bắt đầu</p>
    <p class="text-gray-400 text-xs mt-1">Chọn từ danh sách bên trái hoặc thêm website mới</p>
  </div>`;
}

async function loadSites() {
  const sites = await api('/sites').catch(() => []);
  const el = document.getElementById('sitesList');
  if (!sites.length) {
    el.innerHTML = `<div class="text-center py-6">
      <p class="text-gray-400 text-xs">Chưa có website nào</p>
      <p class="text-gray-300 text-xs mt-1">Thêm website đầu tiên ↑</p>
    </div>`;
    return;
  }
  el.innerHTML = sites.map(s => `
    <div onclick="selectSite(${JSON.stringify(s).replace(/"/g,'&quot;')})"
         id="site-${s.id}"
         class="site-card px-3 py-2.5 rounded-xl cursor-pointer group flex items-start justify-between gap-2">
      <div class="min-w-0">
        <p class="font-semibold text-sm text-gray-800 truncate">${escHtml(s.name)}</p>
        <p class="text-xs text-gray-400 truncate mt-0.5">${escHtml(s.domain)}</p>
        ${s.lastChecked
          ? `<p class="text-xs mt-1" style="color:#10B981">✓ ${fmtDate(s.lastChecked)}</p>`
          : `<p class="text-xs text-gray-300 mt-1">Chưa check</p>`}
      </div>
      <button onclick="deleteSite(${s.id}, event)"
        class="opacity-0 group-hover:opacity-100 flex-shrink-0 mt-0.5 text-gray-300 hover:text-red-500 transition text-lg leading-none">×</button>
    </div>
  `).join('');
  if (!selectedSite) selectSite(sites[0]);
}

async function addSite(e) {
  e.preventDefault();
  const domain = document.getElementById('domainInput').value.trim();
  const name   = document.getElementById('nameInput').value.trim();
  if (!domain) return;
  try {
    await api('/sites', 'POST', { domain, name });
    document.getElementById('domainInput').value = '';
    document.getElementById('nameInput').value   = '';
    await loadSites();
  } catch(err) { alert('Lỗi: ' + err.message); }
}

async function deleteSite(id, e) {
  e.stopPropagation();
  if (!confirm('Xoá website này và toàn bộ keywords + rankings?')) return;
  await api('/sites/' + id, 'DELETE');
  if (selectedSite?.id === id) {
    selectedSite = null;
    document.getElementById('keywordsPanel').innerHTML = emptyKeywordsHtml();
    document.getElementById('rankingsPanel').style.display = 'none';
  }
  await loadSites();
}

function selectSite(site) {
  selectedSite = site;
  document.querySelectorAll('.site-card').forEach(el => el.classList.remove('active'));
  document.getElementById('site-' + site.id)?.classList.add('active');
  renderKeywords();
  renderRankings();
}

// ── Keywords ──────────────────────────────────────────────────────────────────
async function renderKeywords() {
  if (!selectedSite) return;
  const kws = await api('/keywords/' + selectedSite.id).catch(() => []);
  const el  = document.getElementById('keywordsPanel');

  el.innerHTML = `
    <!-- Site header -->
    <div class="flex items-start justify-between mb-5">
      <div>
        <h2 class="font-bold text-base text-gray-900">${escHtml(selectedSite.name)}</h2>
        <p class="text-sm text-gray-400 mt-0.5">${escHtml(selectedSite.domain)}</p>
      </div>
      <div class="flex items-center gap-2">
        ${kws.length ? `
        <button onclick="checkWithExtension()"
          class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-semibold text-white transition shadow-sm"
          style="background:var(--mb-violet)"
          onmouseover="this.style.background='var(--mb-violet2)'" onmouseout="this.style.background='var(--mb-violet)'">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Check Rankings
        </button>` : ''}
        <button onclick="deleteSite(${selectedSite.id}, event)"
          class="px-3 py-2 rounded-xl text-xs font-medium transition border"
          style="color:#EF4444; border-color:#FECACA"
          onmouseover="this.style.background='#FFF5F5'" onmouseout="this.style.background=''">
          Xoá site
        </button>
      </div>
    </div>

    <!-- Add keyword forms (2 col) -->
    <div class="grid grid-cols-2 gap-3 mb-5">
      <!-- Single -->
      <div class="bg-gray-50 rounded-xl p-3">
        <p class="text-xs font-semibold text-gray-500 mb-2">Thêm từ khóa</p>
        <form onsubmit="addKeyword(event)" class="flex gap-2">
          <input id="kwInput" type="text" placeholder="Nhập keyword..."
            class="flex-1 px-3 py-2 border border-gray-200 bg-white rounded-lg text-sm transition min-w-0">
          <button type="submit"
            class="px-4 py-2 rounded-lg text-sm font-semibold text-white flex-shrink-0 transition"
            style="background:#10B981" onmouseover="this.style.background='#059669'" onmouseout="this.style.background='#10B981'">
            +
          </button>
        </form>
      </div>
      <!-- Bulk -->
      <div class="bg-gray-50 rounded-xl p-3">
        <p class="text-xs font-semibold text-gray-500 mb-2">Paste nhiều từ khóa (mỗi dòng 1 từ)</p>
        <div class="flex gap-2">
          <textarea id="bulkInput" rows="2" placeholder="keyword 1&#10;keyword 2&#10;keyword 3..."
            class="flex-1 px-3 py-2 border border-gray-200 bg-white rounded-lg text-xs transition resize-none min-w-0"></textarea>
          <button onclick="addBulkKeywords()"
            class="px-3 py-2 rounded-lg text-xs font-semibold text-white flex-shrink-0 self-end transition"
            style="background:#10B981" onmouseover="this.style.background='#059669'" onmouseout="this.style.background='#10B981'">
            Thêm
          </button>
        </div>
      </div>
    </div>

    <!-- Keyword list -->
    <div>
      <div class="flex items-center justify-between mb-2">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider">${kws.length} từ khóa</p>
      </div>
      <div id="kwList" class="grid grid-cols-2 gap-1.5 max-h-56 overflow-y-auto pr-1">
        ${kws.length
          ? kws.map(k => `
              <div class="flex items-center justify-between bg-gray-50 hover:bg-gray-100 px-3 py-2 rounded-lg transition group">
                <span class="text-sm text-gray-700 truncate">${escHtml(k.keyword)}</span>
                <button onclick="deleteKeyword(${k.id})"
                  class="text-gray-300 hover:text-red-500 text-base leading-none ml-2 flex-shrink-0 transition opacity-0 group-hover:opacity-100">×</button>
              </div>`).join('')
          : `<div class="col-span-2 text-center py-6">
               <p class="text-gray-400 text-sm">Chưa có từ khóa nào</p>
               <p class="text-gray-300 text-xs mt-1">Thêm từ khóa để bắt đầu theo dõi</p>
             </div>`
        }
      </div>
    </div>
  `;
}

async function addKeyword(e) {
  e.preventDefault();
  if (!selectedSite) return;
  const kw = document.getElementById('kwInput').value.trim();
  if (!kw) return;
  try {
    await api('/keywords', 'POST', { siteId: selectedSite.id, keyword: kw });
    document.getElementById('kwInput').value = '';
    renderKeywords();
  } catch(err) { alert('Lỗi: ' + err.message); }
}

async function addBulkKeywords() {
  if (!selectedSite) return;
  const raw = document.getElementById('bulkInput').value.trim();
  if (!raw) return;
  const keywords = raw.split('\n').map(k => k.trim()).filter(Boolean);
  if (!keywords.length) return;
  try {
    const res = await api('/keywords/bulk', 'POST', { siteId: selectedSite.id, keywords });
    document.getElementById('bulkInput').value = '';
    alert(`✅ Đã thêm ${res.added} từ khóa`);
    renderKeywords();
  } catch(err) { alert('Lỗi: ' + err.message); }
}

async function deleteKeyword(id) {
  await api('/keywords/' + id, 'DELETE');
  renderKeywords();
}

// ── Rankings (static — load từ DB sau khi job xong) ───────────────────────────
async function renderRankings() {
  if (!selectedSite) return;
  const panel = document.getElementById('rankingsPanel');
  const [rows, bests] = await Promise.all([
    api('/rankings/' + selectedSite.id).catch(() => []),
    api('/best-rankings/' + selectedSite.id).catch(() => []),
  ]);
  if (!rows.length) { panel.style.display = 'none'; return; }
  panel.style.display = '';

  const bestMap  = {};
  bests.forEach(b => { if (b.bestPosition != null) bestMap[b.keyword] = b.bestPosition; });

  const top3     = rows.filter(r => r.position != null && r.position <= 3).length;
  const top10    = rows.filter(r => r.position != null && r.position <= 10).length;
  const notFound = rows.filter(r => r.position == null).length;
  const hasUrls  = rows.some(r => r.url);

  panel.innerHTML = `
    <!-- Header row -->
    <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
      <div>
        <h2 class="font-bold text-gray-900">Rankings</h2>
        <p class="text-sm text-gray-400 mt-0.5">${escHtml(selectedSite.domain)}</p>
      </div>
      <div class="flex items-center gap-2 flex-wrap">
        ${!hasUrls ? `<span class="text-xs text-amber-600 bg-amber-50 border border-amber-200 px-3 py-1.5 rounded-lg">
          ⚡ Check lại để lấy Landing Page URL
        </span>` : ''}
        <button onclick="exportCSV()"
          class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-semibold transition border"
          style="color:#059669; border-color:#A7F3D0; background:#F0FDF4"
          onmouseover="this.style.background='#DCFCE7'" onmouseout="this.style.background='#F0FDF4'">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 12l-4-4h2.5V3h3v5H12L8 12zM2 13h12v1.5H2V13z"/></svg>
          Xuất CSV
        </button>
        <button onclick="checkWithExtension()"
          class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-semibold text-white transition"
          style="background:var(--mb-violet)"
          onmouseover="this.style.background='var(--mb-violet2)'" onmouseout="this.style.background='var(--mb-violet)'">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          Check lại
        </button>
        <select id="sortSel" onchange="sortRankings()"
          class="text-xs border border-gray-200 rounded-xl px-2 py-2 text-gray-600 bg-white cursor-pointer">
          <option value="position">Thứ hạng</option>
          <option value="best">Tốt nhất</option>
          <option value="keyword">A → Z</option>
          <option value="date">Mới nhất</option>
        </select>
      </div>
    </div>

    <div id="checkBanner" style="display:none" class="mb-4"></div>

    <!-- Stats cards -->
    <div class="grid grid-cols-4 gap-3 mb-5">
      ${statCard(rows.length, 'Tổng', '#7C3AED', '#F5F3FF', '#EDE9FE')}
      ${statCard(top3,        'Top 3', '#D97706', '#FFFBEB', '#FEF3C7')}
      ${statCard(top10,       'Top 10', '#059669', '#F0FDF4', '#DCFCE7')}
      ${statCard(notFound,    'Ngoài top 100', '#6B7280', '#F9FAFB', '#F3F4F6')}
    </div>

    <!-- Table -->
    <div class="overflow-x-auto rounded-xl border border-gray-100">
      <table class="w-full text-sm">
        <thead>
          <tr style="background:#F8FAFC; border-bottom:1px solid #E5E7EB">
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Từ khóa</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider w-24">Vị trí</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider w-24">Tốt nhất</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Landing Page</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider w-28">Cập nhật</th>
          </tr>
        </thead>
        <tbody id="rankingsTbody" class="divide-y divide-gray-50">
          ${renderRankingRows(rows, bestMap)}
        </tbody>
      </table>
    </div>
  `;
  window._rankRows = rows;
  window._rankBest = bestMap;
}

function statCard(val, label, color, bg, border) {
  return `<div class="rounded-xl p-4 text-center" style="background:${bg}; border:1px solid ${border}">
    <p class="text-2xl font-bold" style="color:${color}">${val}</p>
    <p class="text-xs mt-1 font-medium" style="color:${color}; opacity:.75">${label}</p>
  </div>`;
}

function renderRankingRows(rows, bestMap = {}) {
  return rows.map(r => {
    const best      = bestMap[r.keyword];
    const trend     = (r.position != null && best != null)
      ? (r.position <= best
          ? `<span class="text-green-500 text-xs ml-1">▲</span>`
          : (r.position > best ? `<span class="text-red-400 text-xs ml-1">▼</span>` : ''))
      : '';
    const bestBadge = best != null
      ? `<span class="text-xs font-bold" style="color:var(--mb-indigo)">#${best}</span>${trend}`
      : `<span class="text-gray-300 text-xs">—</span>`;
    const landing   = r.url
      ? `<a href="${escHtml(r.url)}" target="_blank" rel="noopener"
            title="${escHtml(r.url)}"
            class="text-xs hover:underline truncate block max-w-xs" style="color:#4F46E5">
            ${escHtml(r.url.replace(/^https?:\/\/(www\.)?/,'').replace(/\?.*$/,'').slice(0,55))}
           </a>`
      : `<span class="text-gray-300 text-xs">—</span>`;
    return `
      <tr class="rank-row transition-colors">
        <td class="px-4 py-3 font-medium text-gray-800">${escHtml(r.keyword)}</td>
        <td class="px-4 py-3 text-center">${r.position == null ? '<span class="text-gray-300">—</span>' : posBadge(r.position)}</td>
        <td class="px-4 py-3 text-center">${bestBadge}</td>
        <td class="px-4 py-3">${landing}</td>
        <td class="px-4 py-3 text-center text-xs text-gray-400">${r.checkedAt ? fmtDate(r.checkedAt) : '—'}</td>
      </tr>`;
  }).join('');
}

function sortRankings() {
  const by   = document.getElementById('sortSel').value;
  const rows = [...(window._rankRows || [])];
  const best = window._rankBest || {};
  if (by === 'position') rows.sort((a,b) => (a.position==null?9999:a.position) - (b.position==null?9999:b.position));
  if (by === 'best')     rows.sort((a,b) => (best[a.keyword]==null?9999:best[a.keyword]) - (best[b.keyword]==null?9999:best[b.keyword]));
  if (by === 'keyword')  rows.sort((a,b) => a.keyword.localeCompare(b.keyword));
  if (by === 'date')     rows.sort((a,b) => (b.checkedAt||'').localeCompare(a.checkedAt||''));
  document.getElementById('rankingsTbody').innerHTML = renderRankingRows(rows, best);
}

// ── Extension live check ──────────────────────────────────────────────────────
let checkingRows = {};
let currentChecking = '';
let liveRendered  = false;
let liveKwsOrder  = [];

window.addEventListener('rank-checker-ready', () => console.log('✅ Extension ready'));

// Nhận keyword đang check từ background (push real-time qua content-bridge)
window.addEventListener('rank-checker-status', (e) => {
  currentChecking = e.detail?.currentKeyword || '';
});
window.addEventListener('rank-checker-ack', (e) => {
  if (e.detail?.ok) return;
  const msg   = e.detail?.message || '';
  const isInc = e.detail?.error === 'no_incognito' || msg.toLowerCase().includes('incognito');
  setCheckingBanner('error',
    isInc
      ? '❌ Chưa bật "Allow in Incognito" — chrome://extensions/ → Moodbiz Rank Checker → Details → bật Allow in Incognito → Reload'
      : '⚠️ Extension chưa phản hồi — click icon Extension trên toolbar → "▶ Bắt đầu kiểm tra"'
  );
});

function setCheckingBanner(state, msg) {
  const el = document.getElementById('checkBanner');
  if (!el) return;
  if (!state) { el.style.display = 'none'; return; }
  const styles = {
    checking: 'background:#EFF6FF; border-color:#BFDBFE; color:#1D4ED8',
    done:     'background:#F0FDF4; border-color:#A7F3D0; color:#065F46',
    error:    'background:#FFF5F5; border-color:#FECACA; color:#991B1B',
  };
  el.style.cssText = `border:1px solid; border-radius:12px; padding:10px 14px; font-size:13px; display:block; ${styles[state]||styles.checking}`;
  el.textContent = msg;
}

async function checkWithExtension() {
  if (!selectedSite) return;
  try {
    const job = await api('/check-queue', 'POST', { siteId: selectedSite.id });
    if (!job.jobId) { alert(job.message || 'Thêm keywords trước.'); return; }
    extJobId = job.jobId;

    checkingRows  = {};
    liveRendered  = false;
    liveKwsOrder  = [];
    const kws = await api('/keywords/' + selectedSite.id).catch(() => []);
    kws.forEach(k => { checkingRows[k.keyword] = 'pending'; });

    setCheckingBanner('checking', `⏳ Đang kích hoạt Extension... (${job.total} từ khóa)`);
    renderRankingsLive([], job.total);
    window.dispatchEvent(new CustomEvent('rank-checker-trigger', { detail: { jobId: job.jobId } }));

    setTimeout(() => {
      if (extJobId && Object.values(checkingRows).every(v => v === 'pending'))
        setCheckingBanner('error', '⚠️ Extension chưa phản hồi — click icon Extension → "▶ Bắt đầu kiểm tra"');
    }, 8000);

    if (extPollTimer) clearInterval(extPollTimer);
    extPollTimer = setInterval(pollExtJob, 2000);
  } catch(err) { alert('Lỗi: ' + err.message); }
}

async function pollExtJob() {
  if (!extJobId) return;
  try {
    const s   = await api('/check-status/' + extJobId);
    const pct = s.total > 0 ? Math.round((s.completed / s.total) * 100) : 0;
    s.results.forEach(r => { checkingRows[r.keyword] = r.position ?? null; });

    setCheckingBanner('checking',
      `🔍 Đang kiểm tra: ${s.completed}/${s.total} từ khóa (${pct}%)${currentChecking ? ' — "' + currentChecking + '"' : ''}`);

    if (!liveRendered) {
      await renderRankingsLive(s.results, s.total);
    } else {
      updateLiveProgress(s.completed, s.total, pct);
      updateLiveStats(s.results, liveKwsOrder.length);
      // Cập nhật tất cả keyword đã có kết quả (luôn hiện kết quả thật, không phụ thuộc currentChecking)
      s.results.forEach(r => updateLiveRow(r.keyword, r.position ?? null, r.url || null));
      // Chỉ update spinner cho keyword đang check (currentChecking)
      if (currentChecking) updateLiveRowState(currentChecking);
    }

    if (s.done) {
      clearInterval(extPollTimer); extPollTimer = null;
      extJobId = null; currentChecking = ''; liveRendered = false; checkingRows = {};
      setCheckingBanner('done', `✅ Hoàn thành! ${s.completed}/${s.total} từ khóa — tìm thấy ${s.results.filter(r=>r.position!=null).length}`);
      await renderRankings();
      setTimeout(() => setCheckingBanner(null), 6000);
    }
  } catch(e) {}
}

// ── Partial DOM update helpers (chống giật) ───────────────────────────────────
function kwId(kw) {
  return 'kr_' + Array.from(String(kw)).map(c => c.codePointAt(0).toString(16).padStart(4,'0')).join('');
}
function kwRowEl(kw) { return document.getElementById(kwId(kw)); }

function liveBadgeHtml(pos, isChecked, isPending, isChecking) {
  if (isChecking)               return `<span class="inline-flex items-center gap-1 text-xs font-medium" style="color:#3B82F6">
    <span class="w-3 h-3 border-2 border-t-transparent rounded-full spin inline-block" style="border-color:#93C5FD; border-top-color:transparent"></span>
    Checking...
  </span>`;
  if (isPending)                return '<span class="text-gray-300 text-xs">⏳</span>';
  if (isChecked && pos == null) return '<span class="text-gray-300">—</span>';
  if (pos != null)              return posBadge(pos);
  return '<span class="text-gray-300">—</span>';
}

function liveLandingHtml(url, isChecked, isChecking) {
  if (isChecking) return '<span class="text-xs animate-pulse" style="color:#93C5FD">Đang tìm...</span>';
  if (url) {
    const short = escHtml(url.replace(/^https?:\/\/(www\.)?/,'').replace(/\/$/, '').slice(0,55));
    return `<a href="${escHtml(url)}" target="_blank" title="${escHtml(url)}"
      class="text-xs hover:underline truncate block max-w-xs" style="color:#4F46E5">${short}</a>`;
  }
  if (isChecked) return '<span class="text-gray-300 text-xs">Không có</span>';
  return '<span class="text-gray-200 text-xs">—</span>';
}

function updateLiveProgress(done, total, pct) {
  const fill = document.getElementById('liveProgFill');
  const txt  = document.getElementById('liveProgTxt');
  if (fill) fill.style.width = pct + '%';
  if (txt)  txt.textContent  = `${done} / ${total}  (${pct}%)`;
}

function updateLiveStats(results, totalKws) {
  const found = results.filter(r => r.position != null).length;
  const top3  = results.filter(r => r.position != null && r.position <= 3).length;
  const top10 = results.filter(r => r.position != null && r.position <= 10).length;
  const g = id => document.getElementById(id);
  if (g('lsTop3'))   g('lsTop3').textContent   = top3;
  if (g('lsTop10'))  g('lsTop10').textContent  = top10;
  if (g('lsNorank')) g('lsNorank').textContent = totalKws - found;
}

function updateLiveRow(kw, pos, url) {
  const tr = kwRowEl(kw);
  if (!tr) return;
  // Chỉ gọi cho keyword ĐÃ CÓ KẾT QUẢ trong s.results
  // → KHÔNG dùng currentChecking (có thể stale do race condition giữa push event và poll)
  // → Luôn hiển thị kết quả thật, xóa opacity pending
  const badgeEl = tr.querySelector('.krc-b');
  const landEl  = tr.querySelector('.krc-l');
  if (badgeEl) badgeEl.innerHTML = pos != null
    ? posBadge(pos)
    : '<span class="text-gray-300">—</span>';
  if (landEl)  landEl.innerHTML  = liveLandingHtml(url, true, false);
  tr.className   = 'rank-row transition-colors';
  tr.style.opacity = '';
}

function updateLiveRowState(kw) {
  const tr = kwRowEl(kw);
  if (!tr) return;
  const isChecking = kw === currentChecking;
  const isDone     = kw in checkingRows && checkingRows[kw] !== 'pending';
  const pos        = isDone ? (checkingRows[kw] ?? null) : null;
  const badgeEl = tr.querySelector('.krc-b');
  const landEl  = tr.querySelector('.krc-l');
  if (badgeEl) badgeEl.innerHTML = liveBadgeHtml(pos, isDone, !isDone && !isChecking, isChecking);
  if (landEl)  landEl.innerHTML  = liveLandingHtml(null, isDone, isChecking);
  tr.style.opacity = (!isDone && !isChecking) ? '.45' : '';
  tr.className = `rank-row transition-colors${isChecking ? ' checking' : ''}`;
}

// ── Live rankings table (full render — 1 lần / job) ───────────────────────────
async function renderRankingsLive(results, total) {
  if (!selectedSite) return;
  const panel = document.getElementById('rankingsPanel');
  panel.style.display = '';

  const [kws, bests] = await Promise.all([
    api('/keywords/' + selectedSite.id).catch(() => []),
    api('/best-rankings/' + selectedSite.id).catch(() => []),
  ]);
  const bestMap   = {};
  bests.forEach(b => { if (b.bestPosition != null) bestMap[b.keyword] = b.bestPosition; });
  const resultMap = {};
  results.forEach(r => { resultMap[r.keyword] = r; });

  const done  = results.length;
  const found = results.filter(r => r.position != null).length;
  const top3  = results.filter(r => r.position != null && r.position <= 3).length;
  const top10 = results.filter(r => r.position != null && r.position <= 10).length;
  const pct   = total > 0 ? Math.round((done / total) * 100) : 0;

  liveKwsOrder = kws.map(k => k.keyword);
  liveRendered = true;

  panel.innerHTML = `
    <!-- Header -->
    <div class="flex items-center justify-between mb-5">
      <div>
        <h2 class="font-bold text-gray-900">Rankings</h2>
        <p class="text-sm text-gray-400 mt-0.5">${escHtml(selectedSite.domain)}</p>
      </div>
      <button onclick="checkWithExtension()"
        class="flex items-center gap-1.5 px-3 py-2 rounded-xl text-xs font-semibold text-white transition"
        style="background:var(--mb-violet)"
        onmouseover="this.style.background='var(--mb-violet2)'" onmouseout="this.style.background='var(--mb-violet)'">
        🔍 Check lại
      </button>
    </div>

    <div id="checkBanner" style="display:none" class="mb-4"></div>

    <!-- Progress -->
    <div class="mb-5 bg-gray-50 rounded-xl p-4">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs font-semibold text-gray-500 uppercase tracking-wider">Tiến trình</span>
        <span id="liveProgTxt" class="text-xs font-bold" style="color:var(--mb-violet)">${done} / ${total}  (${pct}%)</span>
      </div>
      <div class="h-2.5 bg-gray-200 rounded-full overflow-hidden">
        <div id="liveProgFill" class="h-full rounded-full transition-all duration-500"
             style="width:${pct}%; background:linear-gradient(90deg,#7C3AED,#4F46E5)"></div>
      </div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-4 gap-3 mb-5">
      ${statCard(kws.length, 'Tổng', '#7C3AED', '#F5F3FF', '#EDE9FE')}
      <div class="rounded-xl p-4 text-center" style="background:#FFFBEB; border:1px solid #FEF3C7">
        <p id="lsTop3" class="text-2xl font-bold" style="color:#D97706">${top3}</p>
        <p class="text-xs mt-1 font-medium" style="color:#D97706; opacity:.75">Top 3</p>
      </div>
      <div class="rounded-xl p-4 text-center" style="background:#F0FDF4; border:1px solid #DCFCE7">
        <p id="lsTop10" class="text-2xl font-bold" style="color:#059669">${top10}</p>
        <p class="text-xs mt-1 font-medium" style="color:#059669; opacity:.75">Top 10</p>
      </div>
      <div class="rounded-xl p-4 text-center" style="background:#F9FAFB; border:1px solid #F3F4F6">
        <p id="lsNorank" class="text-2xl font-bold text-gray-400">${kws.length - found}</p>
        <p class="text-xs mt-1 font-medium text-gray-400 opacity-75">Ngoài top 100</p>
      </div>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto rounded-xl border border-gray-100">
      <table class="w-full text-sm">
        <thead>
          <tr style="background:#F8FAFC; border-bottom:1px solid #E5E7EB">
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Từ khóa</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider w-24">Vị trí</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider w-24">Tốt nhất</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Landing Page</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-500 uppercase tracking-wider w-24">Cập nhật</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          ${kws.map(k => {
            const isChecking = k.keyword === currentChecking;
            const resItem    = resultMap[k.keyword];
            const isChecked  = !!resItem;
            const pos        = resItem?.position ?? null;
            const url        = resItem?.url || null;
            const isPending  = !isChecked && !isChecking;
            const best       = bestMap[k.keyword] ?? null;
            const bestBadge  = best != null
              ? `<span class="text-xs font-bold" style="color:var(--mb-indigo)">#${best}</span>`
              : '<span class="text-gray-300 text-xs">—</span>';
            return `<tr id="${kwId(k.keyword)}" class="rank-row transition-colors${isChecking?' checking':''}"
                        style="${isPending ? 'opacity:.45' : ''}">
              <td class="px-4 py-3 font-medium text-gray-800">${escHtml(k.keyword)}</td>
              <td class="px-4 py-3 text-center krc-b">${liveBadgeHtml(pos, isChecked, isPending, isChecking)}</td>
              <td class="px-4 py-3 text-center">${bestBadge}</td>
              <td class="px-4 py-3 krc-l">${liveLandingHtml(url, isChecked, isChecking)}</td>
              <td class="px-4 py-3 text-center text-xs text-gray-400">—</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}

// ── Position badge ────────────────────────────────────────────────────────────
function posBadge(pos) {
  if (pos <= 3)  return `<span class="badge" style="background:#FEF3C7;color:#92400E">#${pos}</span>`;
  if (pos <= 10) return `<span class="badge" style="background:#D1FAE5;color:#065F46">#${pos}</span>`;
  if (pos <= 30) return `<span class="badge" style="background:#DBEAFE;color:#1E40AF">#${pos}</span>`;
  return            `<span class="badge" style="background:#F3F4F6;color:#4B5563">#${pos}</span>`;
}

// ── CSV Export ────────────────────────────────────────────────────────────────
async function exportCSV() {
  if (!selectedSite) return;
  const [rows, bests] = await Promise.all([
    api('/rankings/' + selectedSite.id).catch(() => []),
    api('/best-rankings/' + selectedSite.id).catch(() => []),
  ]);
  const bestMap = {};
  bests.forEach(b => { bestMap[b.keyword] = b.bestPosition; });

  const header  = ['Keyword', 'Vị trí hiện tại', 'Tốt nhất', 'Landing Page', 'Cập nhật'];
  const csvRows = rows.map(r => [
    `"${r.keyword.replace(/"/g,'""')}"`,
    r.position  != null ? r.position : '',
    bestMap[r.keyword] != null ? bestMap[r.keyword] : '',
    r.url ? `"${r.url.replace(/"/g,'""')}"` : '',
    r.checkedAt ? new Date(r.checkedAt).toLocaleDateString('vi-VN') : '',
  ]);

  const csv  = [header, ...csvRows].map(row => row.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url,
    download: `rankings_${selectedSite.domain}_${new Date().toISOString().slice(0,10)}.csv` });
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(d) {
  return new Date(d).toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' });
}

init();
</script>
