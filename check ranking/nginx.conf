## Nginx config cho rank.moodbiz.vn
## Đặt file này tại: /etc/nginx/sites-available/rank-checker
## Kích hoạt: sudo ln -s /etc/nginx/sites-available/rank-checker /etc/nginx/sites-enabled/
## Test:      sudo nginx -t
## Reload:    sudo systemctl reload nginx
##
## Lưu ý: SSL do Cloudflare xử lý (orange cloud ON).
## Server chỉ cần listen port 80 — Cloudflare terminate SSL trước khi đến đây.

server {
    listen 80;
    server_name rank.moodbiz.vn;

    # Chặn request quá lớn (bảo vệ server)
    client_max_body_size 5M;

    # Gzip để tiết kiệm bandwidth
    gzip on;
    gzip_types text/plain application/json text/css application/javascript;
    gzip_min_length 1024;

    # Proxy toàn bộ request tới Node.js server
    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        # Headers cần thiết để Express biết IP thật của user
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket support (nếu sau này cần)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # Timeout cho các request check ranking (có thể chạy lâu)
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint — không log để tránh spam log
    location = /api/health {
        proxy_pass http://127.0.0.1:5000;
        access_log off;
    }

    # Bảo mật: ẩn Nginx version
    server_tokens off;

    # Security headers cơ bản
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
}
